</div>

<section class="relative w-full aspect-square flex items-center justify-center flex-1 my-8 max-h-[530px]">
<!-- Deep Space Glow (Accretion Disk ambient light) -->
<div class="absolute w-[120%] h-[120%] rounded-full bg-[radial-gradient(ellipse_at_center,rgba(46,91,255,0.15)_0%,rgba(17,19,28,0)_70%)] pointer-events-none"></div>

<div class="absolute inset-[-20%] rounded-full bg-[conic-gradient(from_0deg_at_50%_50%,rgba(0,0,0,0)_0%,rgba(79,219,200,0.1)_25%,rgba(0,0,0,0)_50%,rgba(79,219,200,0.1)_75%,rgba(0,0,0,0)_100%)] blur-2xl animate-[spin_60s_linear_infinite]"></div>

<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(0,0,0,1)_80%,rgba(20,20,25,0.4)_100%)]"></div>
</div>

<div class="w-16 h-[1px] bg-outline-variant/80 relative">
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-1.5 h-1.5 bg-error rounded-full shadow-[0_0_4px_rgba(255,180,171,0.8)]"></div>
</div>
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-error mb-0.5">EVENT HORIZON</span>
<span class="font-data-mono text-data-mono text-on-surface text-[12px]">r_s = 1.2×10^10 m</span>
</div>
</div>

<div class="absolute bottom-[20%] -left-8 flex flex-row-reverse items-center gap-2">
<div class="w-12 h-[1px] bg-outline-variant/80 relative">
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-1.5 h-1.5 bg-tertiary rounded-full shadow-[0_0_4px_rgba(79,219,200,0.8)]"></div>
